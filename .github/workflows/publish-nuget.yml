#IGNORE SPELLING: trx fi
name: Publish to NuGet (version branches)

on:
  push:
    branches:
      - version/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-nuget-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CarriganSqlTools/CarriganSqlTools.sln

      - name: Build
        run: dotnet build CarriganSqlTools/CarriganSqlTools.sln --configuration Release --no-restore

      - name: BaseTests
        run: >-
          dotnet test CarriganSqlTools/Carrigan.SqlTools.Base.Tests/Carrigan.SqlTools.Base.Tests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"

      - name: ClientsCoreTests
        run: >-
          dotnet test CarriganSqlTools/Carrigan.SqlTools.Clients.Core.Tests/Carrigan.SqlTools.Clients.Core.Tests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"

      - name: ClientsPostgreSqlTests
        run: >-
          dotnet test CarriganSqlTools/Carrigan.SqlTools.Clients.PostgreSql.Tests/Carrigan.SqlTools.Clients.PostgreSql.Tests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"

      - name: ClientsSqlServerTests
        run: >-
          dotnet test CarriganSqlTools/Carrigan.SqlTools.Clients.SqlServer.Tests/Carrigan.SqlTools.Clients.SqlServer.Tests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"

      - name: GeneratorsPostgreSqlTests
        run: >-
          dotnet test CarriganSqlTools/Carrigan.SqlTools.Generators.PostgreSql.Tests/Carrigan.SqlTools.Generators.PostgreSql.Tests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"

      - name: GeneratorsSqlServerTests
        run: >-
          dotnet test CarriganSqlTools/Carrigan.SqlTools.Generators.SqlServer.Tests/Carrigan.SqlTools.Generators.SqlServer.Tests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/TestResults/**/*.trx
            **/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  build-pack:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      is_alpha: ${{ steps.package_kind.outputs.is_alpha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CarriganSqlTools/CarriganSqlTools.sln

      - name: Build
        run: dotnet build CarriganSqlTools/CarriganSqlTools.sln --configuration Release --no-restore

      - name: Pack solution
        run: >-
          dotnet pack CarriganSqlTools/CarriganSqlTools.sln
          --configuration Release
          --no-build
          -o ./artifacts
          --include-symbols
          -p:SymbolPackageFormat=snupkg

      - name: Detect alpha packages
        id: package_kind
        shell: bash
        run: |
          if find ./artifacts -maxdepth 1 -type f -name '*.nupkg' ! -name '*.snupkg' -print | grep -qi -- '-alpha\.'; then
            echo "is_alpha=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_alpha=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          if-no-files-found: error
          retention-days: 30

  publish-alpha:
    needs: build-pack
    if: startsWith(github.ref, 'refs/heads/version/') && needs.build-pack.outputs.is_alpha == 'true'
    runs-on: ubuntu-latest
    env:
      NUGET_SOURCE: https://api.nuget.org/v3/index.json
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Download NuGet packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: ./artifacts

      - name: Publish packages to NuGet
        shell: bash
        run: |
          find ./artifacts -maxdepth 1 -type f -name '*.nupkg' ! -name '*.snupkg' -print0 |
          while IFS= read -r -d '' file; do
            dotnet nuget push "$file" \
              --api-key "$NUGET_API_KEY" \
              --source "$NUGET_SOURCE" \
              --skip-duplicate \
              --no-symbols
          done

      - name: Publish symbols to NuGet
        shell: bash
        run: |
          find ./artifacts -maxdepth 1 -type f -name '*.snupkg' -print0 |
          while IFS= read -r -d '' file; do
            dotnet nuget push "$file" \
              --api-key "$NUGET_API_KEY" \
              --source "$NUGET_SOURCE" \
              --skip-duplicate
          done

  publish-release:
    needs: build-pack
    if: startsWith(github.ref, 'refs/heads/version/') && needs.build-pack.outputs.is_alpha != 'true'
    runs-on: ubuntu-latest
    environment: nuget-release
    env:
      NUGET_SOURCE: https://api.nuget.org/v3/index.json
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Download NuGet packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: ./artifacts

      - name: Publish packages to NuGet
        shell: bash
        run: |
          find ./artifacts -maxdepth 1 -type f -name '*.nupkg' ! -name '*.snupkg' -print0 |
          while IFS= read -r -d '' file; do
            dotnet nuget push "$file" \
              --api-key "$NUGET_API_KEY" \
              --source "$NUGET_SOURCE" \
              --skip-duplicate \
              --no-symbols
          done

      - name: Publish symbols to NuGet
        shell: bash
        run: |
          find ./artifacts -maxdepth 1 -type f -name '*.snupkg' -print0 |
          while IFS= read -r -d '' file; do
            dotnet nuget push "$file" \
              --api-key "$NUGET_API_KEY" \
              --source "$NUGET_SOURCE" \
              --skip-duplicate
          done